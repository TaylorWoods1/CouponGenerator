name: Deploy Cycle Companion to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'cycle-companion/**'
      - '.github/workflows/deploy-cycle-companion.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./cycle-companion
          commit_message: 'Deploy Cycle Companion'
